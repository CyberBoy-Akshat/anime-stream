<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeVerse | Watch Any Anime</title>
    <!-- HLS.js for playing .m3u8 video streams -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        /* --- CSS VARIABLES & RESET --- */
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #141414;
            --bg-card: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #a3a3a3;
            --accent: #a855f7;
            --accent-hover: #9333ea;
            --border: #262626;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }
        a { text-decoration: none; color: inherit; }
        img { display: block; max-width: 100%; }

        /* --- SCROLLBAR --- */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        /* --- HEADER --- */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }
        .search-container { flex: 1; max-width: 400px; margin: 0 20px; }
        .search-input {
            width: 100%;
            padding: 10px 15px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 20px;
            outline: none;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        .search-input:focus { border-color: var(--accent); }
        
        nav ul { display: flex; list-style: none; gap: 20px; }
        nav a { font-weight: 500; color: var(--text-secondary); transition: color 0.3s; cursor: pointer; }
        nav a:hover, nav a.active { color: var(--text-primary); }

        /* --- MAIN CONTAINER --- */
        .container { max-width: 1400px; margin: 0 auto; padding: 100px 5% 50px; }

        /* --- HERO SECTION --- */
        .hero {
            position: relative;
            height: 50vh;
            min-height: 350px;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 40px;
            display: flex;
            align-items: flex-end;
            padding: 40px;
            background: linear-gradient(to top, var(--bg-primary) 10%, transparent 60%), 
                        url('https://placehold.co/1400x600/1a1a1a/a855f7?text=Trending+Anime') center/cover;
        }
        .hero-content { max-width: 600px; z-index: 2; }
        .hero-content h1 { font-size: 2.5rem; margin-bottom: 15px; line-height: 1.1; }
        .hero-content p { color: var(--text-secondary); margin-bottom: 25px; font-size: 1rem; }
        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 28px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }
        .btn-primary:hover { background: var(--accent-hover); transform: scale(1.05); }

        /* --- SECTIONS & GRIDS --- */
        .section-header { margin-bottom: 25px; }
        .section-title { font-size: 1.5rem; font-weight: 700; }

        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px;
        }
        .anime-card {
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            border: 1px solid var(--border);
        }
        .anime-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 30px rgba(168, 85, 247, 0.15);
            border-color: var(--accent);
        }
        .anime-card img { width: 100%; height: 260px; object-fit: cover; }
        .card-info { padding: 15px; }
        .card-info h3 { font-size: 1rem; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-meta { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--text-secondary); }

        /* --- WATCH VIEW --- */
        #watch-view { display: none; }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-weight: 500;
            margin-bottom: 20px;
            cursor: pointer;
            transition: color 0.3s;
        }
        .back-btn:hover { color: var(--text-primary); }

        .player-wrapper {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .player-wrapper video { width: 100%; height: 100%; object-fit: contain; background: #000; }

        .watch-layout { display: grid; grid-template-columns: 1fr 350px; gap: 30px; }
        .anime-details { background: var(--bg-secondary); padding: 30px; border-radius: 16px; border: 1px solid var(--border); }
        .anime-details h1 { font-size: 2rem; margin-bottom: 15px; }
        .anime-details p { color: var(--text-secondary); margin-bottom: 20px; }

        .episode-panel {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid var(--border);
            height: fit-content;
            max-height: 600px;
            overflow-y: auto;
        }
        .episode-panel h3 { margin-bottom: 20px; font-size: 1.2rem; }
        .ep-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 10px; }
        .ep-btn {
            padding: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        .ep-btn:hover { background: var(--accent); border-color: var(--accent); }
        .ep-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4); }

        /* --- LOADING SPINNER --- */
        .loader { text-align: center; padding: 50px; color: var(--text-secondary); grid-column: 1 / -1; }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- RESPONSIVE --- */
        @media (max-width: 900px) {
            .watch-layout { grid-template-columns: 1fr; }
            .hero-content h1 { font-size: 2rem; }
            .anime-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
            .search-container { display: none; } /* Hide search on mobile for simplicity, or style it differently */
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header>
        <div class="logo" onclick="showHome()">AnimeStream</div>
        <div class="search-container">
            <input type="text" id="search-input" class="search-input" placeholder="Search any anime..." onkeypress="if(event.key === 'Enter') searchAnime()">
        </div>
        <nav>
            <ul>
                <li><a class="active" onclick="showHome()">Home</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        
        <!-- HOME VIEW -->
        <section id="home-view">
            <!-- Hero Section -->
            <div class="hero" id="hero-section">
                <div class="hero-content">
                    <h1 id="hero-title">Loading Top Anime...</h1>
                    <p id="hero-desc">Please wait while we fetch the latest trending anime.</p>
                    <button class="btn-primary" onclick="playHeroAnime()">▶ Watch Now</button>
                </div>
            </div>

            <!-- Trending Grid -->
            <div class="section-header">
                <h2 class="section-title" id="grid-title">Trending Now</h2>
            </div>
            <div class="anime-grid" id="anime-grid">
                <div class="loader"><div class="spinner"></div>Fetching trending anime...</div>
            </div>
        </section>

        <!-- WATCH VIEW -->
        <section id="watch-view">
            <div class="back-btn" onclick="showHome()">&larr; Back to Browse</div>
            
            <div class="player-wrapper">
                <video id="video-player" controls autoplay></video>
            </div>

            <div class="watch-layout">
                <div class="anime-details">
                    <h1 id="watch-title">Anime Title</h1>
                    <p id="watch-desc">Synopsis loading...</p>
                </div>
                
                <div class="episode-panel">
                    <h3>Episodes</h3>
                    <div class="ep-grid" id="ep-grid">
                        <div class="loader"><div class="spinner"></div>Loading episodes...</div>
                    </div>
                </div>
            </div>
        </section>

    </div>

    <script>
        // --- POINTS TO YOUR VERCEL SERVERLESS FUNCTIONS ---
        const API_BASE = '/api'; 

        let trendingAnime = [];
        let currentAnime = null;
        let currentHls = null;
        let heroAnimeId = null;

        // --- 1. FETCH TRENDING ANIME ---
        async function fetchTrendingAnime() {
            const grid = document.getElementById('anime-grid');
            grid.innerHTML = '<div class="loader"><div class="spinner"></div>Fetching trending anime...</div>';
            document.getElementById('grid-title').innerText = 'Trending Now';
            
            const popularTitles = ['One Piece', 'Jujutsu Kaisen', 'Demon Slayer', 'Naruto', 'Attack on Titan', 'My Hero Academia', 'Solo Leveling', 'Frieren'];
            let allResults = [];
            
            try {
                // Fetch them concurrently for speed
                const promises = popularTitles.map(title => 
                    fetch(`${API_BASE}/search?q=${encodeURIComponent(title)}`)
                        .then(res => res.json())
                        .catch(() => null)
                );
                const results = await Promise.all(promises);
                
                results.forEach(data => {
                    if (data && data.results && data.results.length > 0) {
                        allResults.push(data.results[0]);
                    }
                });
                
                trendingAnime = allResults;
                renderAnimeGrid();
                setupHero();
            } catch (error) {
                console.error("Error fetching anime:", error);
                grid.innerHTML = '<p style="color:red; text-align:center; grid-column: 1/-1;">Failed to connect to backend. Check Vercel deployment!</p>';
            }
        }

        // --- 2. SEARCH ANIME ---
        async function searchAnime() {
            const query = document.getElementById('search-input').value.trim();
            if (!query) return;

            const grid = document.getElementById('anime-grid');
            grid.innerHTML = '<div class="loader"><div class="spinner"></div>Searching...</div>';
            document.getElementById('grid-title').innerText = `Search Results for "${query}"`;

            try {
                const res = await fetch(`${API_BASE}/search?q=${encodeURIComponent(query)}`);
                const data = await res.json();
                
                if (data.results && data.results.length > 0) {
                    trendingAnime = data.results;
                    renderAnimeGrid();
                } else {
                    grid.innerHTML = '<p style="text-align:center; color: #a3a3a3; grid-column: 1/-1;">No anime found.</p>';
                }
            } catch (error) {
                grid.innerHTML = '<p style="color:red; text-align:center; grid-column: 1/-1;">Search failed.</p>';
            }
        }

        // --- 3. FETCH EPISODES ---
        async function fetchEpisodes(animeId) {
            const epGrid = document.getElementById('ep-grid');
            epGrid.innerHTML = '<div class="loader"><div class="spinner"></div>Loading episodes...</div>';
            
            try {
                // Uses the /api/info endpoint with ?id=
                const response = await fetch(`${API_BASE}/info?id=${animeId}`);
                const data = await response.json();
                
                if (data.episodes) {
                    renderEpisodes(data.episodes);
                } else {
                    epGrid.innerHTML = '<p>No episodes found.</p>';
                }
            } catch (error) {
                console.error("Error fetching episodes:", error);
                epGrid.innerHTML = '<p>Could not load episodes.</p>';
            }
        }

        // --- 4. PLAY EPISODE (FETCHES REAL VIDEO LINK) ---
        async function playEpisode(btnElement) {
            document.querySelectorAll('.ep-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');

            const episodeId = btnElement.dataset.episodeId;
            const video = document.getElementById('video-player');
            
            try {
                // Uses the /api/watch endpoint with ?episodeId=
                const response = await fetch(`${API_BASE}/watch?episodeId=${episodeId}`);
                const data = await response.json();
                
                if (data.sources && data.sources.length > 0) {
                    // Find the default or highest quality source
                    const videoSource = data.sources.find(s => s.quality === 'default') || data.sources[0];
                    loadVideo(videoSource.url);
                } else {
                    alert("No video sources found. The API provider might be temporarily blocked.");
                }
            } catch (error) {
                console.error("Error fetching video:", error);
                alert("Failed to fetch video link. The API might be temporarily down.");
            }
        }

        // --- UI RENDERING ---
        function renderAnimeGrid() {
            const grid = document.getElementById('anime-grid');
            grid.innerHTML = '';
            
            trendingAnime.forEach(anime => {
                const card = document.createElement('div');
                card.className = 'anime-card';
                card.onclick = () => openWatchView(anime);
                
                card.innerHTML = `
                    <img src="${anime.image}" alt="${anime.title}" loading="lazy">
                    <div class="card-info">
                        <h3>${anime.title}</h3>
                        <div class="card-meta">
                            <span>${anime.subOrDub || 'Anime'}</span>
                            <span style="color: var(--accent);">Watch ▶</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function setupHero() {
            if (trendingAnime.length > 0) {
                const topAnime = trendingAnime[0];
                heroAnimeId = topAnime.id;
                document.getElementById('hero-title').innerText = topAnime.title;
                document.getElementById('hero-desc').innerText = `Watch the latest episodes of ${topAnime.title} in HD!`;
                document.getElementById('hero-section').style.backgroundImage = `linear-gradient(to top, var(--bg-primary) 10%, transparent 60%), url('${topAnime.image}')`;
            }
        }

        function renderEpisodes(episodes) {
            const epGrid = document.getElementById('ep-grid');
            epGrid.innerHTML = '';
            
            if (!episodes || episodes.length === 0) {
                epGrid.innerHTML = '<p>No episodes found.</p>';
                return;
            }

            episodes.forEach(ep => {
                const btn = document.createElement('div');
                btn.className = 'ep-btn';
                btn.innerText = ep.number || 'EP';
                btn.dataset.episodeId = ep.episodeId; // Save the ID for the API call
                btn.onclick = () => playEpisode(btn);
                epGrid.appendChild(btn);
            });
        }

        function openWatchView(anime) {
            currentAnime = anime;
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('watch-view').style.display = 'block';
            
            document.getElementById('watch-title').innerText = anime.title;
            document.getElementById('watch-desc').innerText = `Streaming ${anime.title}. Select an episode below to start watching.`;

            fetchEpisodes(anime.id);
            window.scrollTo(0, 0);
        }

        function showHome() {
            document.getElementById('home-view').style.display = 'block';
            document.getElementById('watch-view').style.display = 'none';
            stopVideo();
        }

        function playHeroAnime() {
            const anime = trendingAnime.find(a => a.id === heroAnimeId);
            if (anime) openWatchView(anime);
        }

        // --- VIDEO PLAYER LOGIC (HLS.js) ---
        function loadVideo(url) {
            const video = document.getElementById('video-player');
            
            if (currentHls) {
                currentHls.destroy();
                currentHls = null;
            }

            if (url.includes('.m3u8')) {
                if (Hls.isSupported()) {
                    currentHls = new Hls();
                    currentHls.loadSource(url);
                    currentHls.attachMedia(video);
                    currentHls.on(Hls.Events.MANIFEST_PARSED, function () {
                        video.play();
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = url;
                    video.addEventListener('loadedmetadata', () => video.play());
                }
            } else {
                video.src = url;
                video.play();
            }
        }

        function stopVideo() {
            const video = document.getElementById('video-player');
            video.pause();
            video.src = "";
            if (currentHls) {
                currentHls.destroy();
                currentHls = null;
            }
        }

        // Initialize App on load
        fetchTrendingAnime();
    </script>
</body>
</html>
