<!DOCTYPE html>
<html>
<head>
 <title>Free Anime</title>
 <script src="https://unpkg.com/hls.js@latest"></script>
</head>
<body>
 <h1>Latest Anime:</h1>
 <ul id="video-list"></ul>

 <script id="video-script">
 fetch('/data.json')
 .then(response => response.json())
 .then(data => {
 const videoListElement = document.getElementById('video-list');
 
 data.forEach(videoUrl => {
 const liElement = document.createElement('li');
 liElement.textContent += `<a href="${videoUrl}">${videoUrl}</a>`;
 videoListElement.appendChild(liElement);
 });
 });

 // Load HLS player when clicked on a link in the list above.
 document.addEventListener("click", event => {
 if (!event.target.href) return; 
 event.preventDefault(); 

 let hlsLinkClickedOnHere=event.target.href;

 if(hlsLinkClickedOnHere.includes("crunchyroll")){

 var hls=new Hls({enableWorker:true});

 var video=document.createElement("video");

 document.body.appendChild(video);

 hls.loadSource(hlsLinkClickedOnHere);

 hls.attachMedia(video); 

 hls.on(Hls.Events.MEDIA_ATTACHED,()=>{
 console.log("media attached");
 // If you have a button that you want to trigger playback on click,
 // add an event listener here and call the play() method.
 video.play();
 });

 }
 });
 </script>

</body>

</html>
